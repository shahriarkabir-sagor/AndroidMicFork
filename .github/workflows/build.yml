name: Build AndroidMic

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # Setup Rust
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy
      
      # Setup Java for Android build
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle
      
      # Build Rust app
      - name: Build Rust App
        working-directory: ./RustApp
        run: |
          cargo build --release
          # Create directories for artifacts
          mkdir -p ../build/rust
          cp target/release/androidmic ../build/rust/
      
      # Build Android app
      - name: Grant execute permission for gradlew
        working-directory: ./Android
        run: chmod +x gradlew
        
      - name: Build Android APK
        working-directory: ./Android
        run: ./gradlew assembleRelease
        
      - name: Copy Android build artifacts
        run: |
          mkdir -p build/android
          cp Android/app/build/outputs/apk/release/*.apk build/android/
      
      # Upload all artifacts
      - name: Upload all artifacts
        uses: actions/upload-artifact@v3
        with:
          name: androidmic-builds
          path: build/